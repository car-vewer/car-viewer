<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cars Viewer</title>
</head>
<body>
    <a href="/" style="text-decoration: none; color: inherit;">
        <h1 class="logo">CARSVIEWER</h1>
    </a>
    <img 
        src="http://localhost:3000/api/images/{{.Image}}" 
        alt="{{.Name}}" 
        class="spec-image"
    >
    <h2>{{.Name}}</h2>

    <div class="specs-grid">

        <div class="spec-label">Engine</div>
        <div class="spec-value">{{.Specifications.Engine}}</div>

        <div class="spec-label">Horsepower</div>
        <div class="spec-value">{{.Specifications.Horsepower}}</div>

        <div class="spec-label">Transmission</div>
        <div class="spec-value">{{.Specifications.Transmission}}</div>

        <div class="spec-label">Drivetrain</div>
        <div class="spec-value">{{.Specifications.Drivetrain}}</div>

    </div>
</body>
</html>
